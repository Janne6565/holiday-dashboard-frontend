name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: janne6565/holiday-dashboard-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deployment:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Cross-repo image bump. Skips cleanly until DEPLOY_REPO_TOKEN (a PAT with write on
    # the deployment repo) is set, so first pushes stay green before the token exists.
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
    steps:
      - name: Set up kustomize
        if: ${{ env.DEPLOY_TOKEN != '' }}
        uses: imranismail/setup-kustomize@v2

      - name: Clone deployment repo
        if: ${{ env.DEPLOY_TOKEN != '' }}
        run: git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/Janne6565/holiday-dashboard-deployment.git deploy-repo

      - name: Bump frontend image tag and push
        if: ${{ env.DEPLOY_TOKEN != '' }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd deploy-repo/overlays/prod
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}:main-${SHORT_SHA}
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git commit -am "ci: frontend image main-${SHORT_SHA}"
          git push
